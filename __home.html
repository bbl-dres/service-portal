<!doctype html><html><head><meta charset="utf-8"></head><body style="margin:0">
<iframe id="f" src="index.html#/" style="width:1400px;height:2400px;border:0"></iframe><pre id="out" style="position:fixed;bottom:0;right:0;color:red;font:11px monospace;background:#fff;z-index:99">…</pre>
<script>
const wait=(ms)=>new Promise(r=>setTimeout(r,ms));const f=document.getElementById('f'),out=document.getElementById('out'),L=[];
(async()=>{ await wait(2800);const d=f.contentDocument;const m=d.querySelector('#main-content');
  L.push('Sections: '+[...m.querySelectorAll('.section__title')].map(h=>h.textContent).join(' | '));
  L.push('Anwendungen-Section weg: '+!/Anwendungen und Daten/.test(m.textContent));
  const gal=[...m.querySelectorAll('.section')].find(s=>/Bestellen und weitere/.test(s.textContent));
  const cards=[...gal.querySelectorAll('.card .card__title')].map(c=>c.textContent);
  L.push('Galerie-Karten ('+cards.length+'): '+cards.join(' | '));
  // bg alternation
  L.push('Section-BG-Klassen: '+[...m.querySelectorAll('.section')].map(s=>s.classList.contains('bg--secondary-50')?'grau':'weiss').join(', '));
  out.textContent=L.join('\n');
})();
</script></body></html>
