<!doctype html><html><head><meta charset="utf-8"></head><body style="margin:0">
<iframe id="f" src="index.html#/" style="width:1440px;height:820px;border:0"></iframe><pre id="out" style="position:fixed;bottom:0;right:0;color:red;font:11px monospace;background:#fff;z-index:99">…</pre>
<script>
const wait=(ms)=>new Promise(r=>setTimeout(r,ms));const f=document.getElementById('f'),out=document.getElementById('out'),L=[];
(async()=>{
  await wait(2600);const d=f.contentDocument,w=f.contentWindow;
  const svc=[...d.querySelectorAll('#desktop-navigation-id [data-menu]')].find(x=>x.getAttribute('data-nav')==='services');
  L.push('L1-Einträge: '+d.querySelectorAll('#desktop-navigation-id > .container > nav > ul > li').length);
  svc.click(); await wait(500);
  const drill=[...d.querySelectorAll('.desktop-menu__drawer')].find(x=>!x.hidden).querySelector('.navy--drill');
  L.push('Drawer navy--drill: '+ !!drill+' level='+drill.getAttribute('data-level'));
  L.push('Bereichszweige (navy-branch): '+drill.querySelectorAll('.navy-branch').length);
  // Büroausrüstung aufklappen
  const b=[...drill.querySelectorAll('.navy-branch')].find(x=>x.getAttribute('data-branch')==='bueroausruestung');
  b.click(); await wait(500);
  L.push('nach Drill: level='+drill.getAttribute('data-level')+' Titel='+drill.querySelector('[data-branch-title]').textContent);
  L.push('Kinder in Ebene 1: '+drill.querySelector('[data-branch-list]').children.length+' (erwartet 8: Übersicht+7)');
  const first=drill.querySelector('[data-branch-list] a');
  L.push('erster Kind-Link extern: '+(first.getAttribute('target')==='_blank')+' href='+first.getAttribute('href').slice(0,45));
  // sichtbarkeit: pane-0 versteckt?
  L.push('pane-0 visibility='+w.getComputedStyle(drill.querySelector('[data-pane="0"]')).visibility);
  // Zurück
  drill.querySelector('[data-back]').click(); await wait(500);
  L.push('nach Zurück: level='+drill.getAttribute('data-level'));
  out.textContent=L.join('\n');
})();
</script></body></html>
