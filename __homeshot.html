<!doctype html><html><head><meta charset="utf-8"></head><body style="margin:0">
<iframe id="f" src="index.html#/" style="width:1400px;height:1400px;border:0"></iframe>
<script>
const wait=(ms)=>new Promise(r=>setTimeout(r,ms));const f=document.getElementById('f');
(async()=>{ await wait(2800);const d=f.contentDocument;
  const gal=[...d.querySelectorAll('#main-content .section')].find(s=>/Bestellen und weitere/.test(s.textContent));
  gal.scrollIntoView(); window.STAGE='ok';
})();
</script></body></html>
