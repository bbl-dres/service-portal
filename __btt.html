<!doctype html><html><head><meta charset="utf-8"></head><body style="margin:0">
<iframe id="f" src="index.html#/knowledge?tab=grundlagen" style="width:1400px;height:800px;border:0"></iframe><pre id="out" style="position:fixed;bottom:0;left:0;color:red;font:11px monospace;background:#fff;z-index:99">…</pre>
<script>
const wait=(ms)=>new Promise(r=>setTimeout(r,ms));const f=document.getElementById('f'),out=document.getElementById('out'),L=[];
(async()=>{ await wait(2800);const d=f.contentDocument,w=f.contentWindow; d.documentElement.style.scrollBehavior='auto';
  const btn=d.querySelector('.back-to-top-btn'), footInfo=d.querySelector('.footer-information');
  const H=d.documentElement.scrollHeight;
  L.push('scrollHeight='+H);
  // mid scroll
  w.scrollTo(0, 1000); await wait(80);
  let b=btn.getBoundingClientRect();
  L.push('mid-scroll(1000): btn top='+Math.round(b.top)+' right-gap='+Math.round(1400-b.right)+' (viewport 800 → sichtbar '+(b.top>0&&b.top<800)+')');
  // bottom
  w.scrollTo(0, H); await wait(80);
  b=btn.getBoundingClientRect(); const fi=footInfo.getBoundingClientRect();
  L.push('bottom: btn top='+Math.round(b.top)+' footerInfo top='+Math.round(fi.top)+' → dockt (btn nahe footerInfo top): '+(Math.abs(b.top-fi.top)<80));
  L.push('btn right-gap am Ende='+Math.round(1400-b.right));
  // whitespace: nach footer noch Inhalt? bottomOfFooter vs scrollHeight
  const foot=d.querySelector('#main-footer').getBoundingClientRect();
  L.push('Footer-Unterkante(abs)='+Math.round(foot.bottom+w.scrollY)+' vs scrollHeight='+H+' (gleich = kein Leerraum)');
  out.textContent=L.join('\n');
})();
</script></body></html>
