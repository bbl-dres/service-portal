<!doctype html><html><head><meta charset="utf-8"></head><body style="margin:0">
<iframe id="f" src="index.html#/" style="width:1440px;height:900px;border:0"></iframe><pre id="out" style="position:fixed;bottom:0;right:0;color:red;font:11px monospace;background:#fff;z-index:99">…</pre>
<script>
const wait=(ms)=>new Promise(r=>setTimeout(r,ms));const f=document.getElementById('f'),out=document.getElementById('out'),L=[];
const R=(el)=>{const r=el.getBoundingClientRect();return `${Math.round(r.left)},${Math.round(r.top)} ${Math.round(r.width)}x${Math.round(r.height)}`;};
(async()=>{
  await wait(2600);const d=f.contentDocument,w=f.contentWindow;
  const svc=[...d.querySelectorAll('#desktop-navigation-id [data-menu]')].find(x=>x.getAttribute('data-nav')==='services');
  svc.click(); await wait(400);
  const drawer=[...d.querySelectorAll('.desktop-menu__drawer')].find(x=>!x.hidden);
  const drill=drawer.querySelector('.navy--drill');
  drill.querySelector('.navy-branch[data-branch="bueroausruestung"]').click(); await wait(700);
  const slider=drill.querySelector('.navy__slider');
  const p0=drill.querySelector('[data-pane="0"]'), p1=drill.querySelector('[data-pane="1"]');
  L.push('drawer: '+R(drawer)+' overflow='+w.getComputedStyle(drawer).overflow);
  L.push('drill:  '+R(drill)+' ovf='+w.getComputedStyle(drill).overflow+' level='+drill.getAttribute('data-level'));
  L.push('slider: '+R(slider)+' disp='+w.getComputedStyle(slider).display+' width='+w.getComputedStyle(slider).width+' tf='+w.getComputedStyle(slider).transform);
  L.push('pane0:  '+R(p0)+' flexb='+w.getComputedStyle(p0).flexBasis);
  L.push('pane1:  '+R(p1)+' flexb='+w.getComputedStyle(p1).flexBasis);
  out.textContent=L.join('\n');
})();
</script></body></html>
