<!doctype html><html><head><meta charset="utf-8"></head><body style="margin:0">
<iframe id="f" src="index.html#/" style="width:1440px;height:900px;border:0"></iframe>
<script>
const wait=(ms)=>new Promise(r=>setTimeout(r,ms));const f=document.getElementById('f');
(async()=>{
  await wait(2600);const d=f.contentDocument;
  const svc=[...d.querySelectorAll('#desktop-navigation-id [data-menu]')].find(x=>x.getAttribute('data-nav')==='services');
  svc.click(); await wait(500);
  window.STAGE='pane0';
})();
</script></body></html>
